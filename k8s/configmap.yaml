apiVersion: v1
kind: ConfigMap
metadata:
  name: healthwatch-config
data:
  PORT: "8080"
  CHECK_FREQUENCY: "30s"
  PING_TIMEOUT: "5s"
  REDIS_ADDR: "healthwatch-redis:6379"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: healthwatch-migrations
data:
  001_init.sql: |
    CREATE TABLE IF NOT EXISTS checks (
        id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        endpoint    TEXT NOT NULL UNIQUE,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS check_jobs (
        id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        check_id     UUID NOT NULL REFERENCES checks(id) ON DELETE CASCADE,
        status       TEXT NOT NULL DEFAULT 'pending',
        scheduled_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        claimed_at   TIMESTAMPTZ,
        done_at      TIMESTAMPTZ
    );
    CREATE INDEX IF NOT EXISTS idx_check_jobs_pending ON check_jobs (status, scheduled_at)
        WHERE status = 'pending';

    CREATE TABLE IF NOT EXISTS check_results (
        id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        check_id    UUID NOT NULL REFERENCES checks(id) ON DELETE CASCADE,
        job_id      UUID REFERENCES check_jobs(id),
        status_code INT,
        status_text TEXT,
        duration_ms INT,
        error       TEXT,
        checked_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS idx_check_results_check_id ON check_results (check_id, checked_at DESC);
