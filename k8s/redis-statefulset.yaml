apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: healthwatch-redis
spec:
  serviceName: healthwatch-redis
  replicas: 1
  selector:
    matchLabels:
      app: healthwatch-redis
  template:
    metadata:
      labels:
        app: healthwatch-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: healthwatch-redis
spec:
  selector:
    app: healthwatch-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
