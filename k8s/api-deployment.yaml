apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthwatch-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthwatch-api
  template:
    metadata:
      labels:
        app: healthwatch-api
    spec:
      containers:
        - name: api
          image: healthwatch-api:latest
          imagePullPolicy: Never  # use image built locally via nerdctl
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: healthwatch-secret
                  key: DATABASE_URL
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: healthwatch-config
                  key: PORT
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: healthwatch-api
spec:
  selector:
    app: healthwatch-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
