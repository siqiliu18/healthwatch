apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthwatch-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthwatch-worker
  template:
    metadata:
      labels:
        app: healthwatch-worker
    spec:
      containers:
        - name: worker
          image: healthwatch-worker:latest
          imagePullPolicy: Never  # use image built locally via nerdctl
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: healthwatch-secret
                  key: DATABASE_URL
            - name: PING_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: healthwatch-config
                  key: PING_TIMEOUT
