apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthwatch-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthwatch-worker
  template:
    metadata:
      labels:
        app: healthwatch-worker
    spec:
      containers:
        - name: worker
          image: us-central1-docker.pkg.dev/healthwatch-siqi-2026/healthwatch/worker:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: healthwatch-secret
                  key: DATABASE_URL
            - name: PING_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: healthwatch-config
                  key: PING_TIMEOUT
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: healthwatch-config
                  key: REDIS_ADDR
