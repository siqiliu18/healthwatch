apiVersion: v1
kind: Service
metadata:
  name: healthwatch-postgres
spec:
  selector:
    app: healthwatch-postgres
  ports:
    - port: 5432
  clusterIP: None  # headless — StatefulSet pods are addressed by DNS
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: healthwatch-postgres
spec:
  serviceName: healthwatch-postgres
  replicas: 1
  selector:
    matchLabels:
      app: healthwatch-postgres
  template:
    metadata:
      labels:
        app: healthwatch-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: healthwatch
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: healthwatch-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthwatch-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "healthwatch"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: migrations
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: migrations
          configMap:
            name: healthwatch-migrations
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
