# Copy to secret.yaml (which is gitignored) and apply before anything else:
#   cp k8s/secret.example.yaml k8s/secret.yaml
#   kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: healthwatch-secret
type: Opaque
stringData:
  POSTGRES_USER: healthwatch
  POSTGRES_PASSWORD: healthwatch
  DATABASE_URL: postgres://healthwatch:healthwatch@healthwatch-postgres:5432/healthwatch?sslmode=disable
